// MD config (repeat for Cable0/0/0 to Cable0/0/15)
interface Cable0/0/0
  downstream integrated-Cable 0/0/0 rf-channel 0
  downstream integrated-Cable 0/0/0 rf-channel 4
  downstream integrated-Cable 0/0/0 rf-channel 8
  downstream integrated-Cable 0/0/0 rf-channel 12
  downstream integrated-Cable 0/0/0 rf-channel 16
  cable bundle 1
  cable dynamic-secret reject nocrypt
  cable map-advance static 2000
  cable privacy accept-self-signed-certificate

// Primary channel config (repeat for all 16 MDs) 
interface Integrated-Cable0/0/0:0
  cable rf-bandwidth-percent 20
interface Integrated-Cable0/0/0:4
  cable rf-bandwidth-percent 20
interface Integrated-Cable0/0/0:8
  cable rf-bandwidth-percent 20
interface Integrated-Cable0/0/0:12
  cable rf-bandwidth-percent 20
interface Integrated-Cable0/0/0:16
  cable rf-bandwidth-percent 20


// Wideband channel config (repeat for all 16 MDs)
interface Wideband-Cable0/0/0:0
  cable privacy accept-self-signed-certificate
  cable rf-channel channel-list 0-3 bandwidth-percent 80
interface Wideband-Cable0/0/0:1
  cable privacy accept-self-signed-certificate
  cable rf-channel channel-list 4-7 bandwidth-percent 80
interface Wideband-Cable0/0/0:2
  cable privacy accept-self-signed-certificate
  cable rf-channel channel-list 8-11 bandwidth-percent 80
interface Wideband-Cable0/0/0:3
  cable privacy accept-self-signed-certificate
  cable rf-channel channel-list 12-15 bandwidth-percent 80
interface Wideband-Cable0/0/0:4
  cable privacy accept-self-signed-certificate
  cable rf-channel channel-list 16-20 bandwidth-percent 80


// DS controller config
controller integrated-Cable 0/0/0 (repeat for 0/0/0 to 0/0/7)
  max-carrier 96
  base-channel-power 34
  freq-profile 0

  rf-chan 0             (repeat for chan 0 to 19 for DOCSIS qams)
    type DOCSIS
    frequency 111000000         (increment by 6000000)
    rf-output NORMAL
    power-adjust 0
    docsis-channel-id 1         (increment by 1)
    qma-profile 1
  ...

  rf-chan 20            (repeat for chan 20 to 27 for video qams)
    type VIDEO
    frequency 231000000         (increment by 6000000)
    rf-output NORMAL
    power-adjust 0
    docsis-channel-id 21        (increment by 1)
    qma-profile 1
  ...

  rf-chan 48            (repeat for chan 48 to 67 for DOCSIS qams)
    type DOCSIS
    frequency 399000000         (increment by 6000000)
    rf-output NORMAL
    power-adjust 0
    docsis-channel-id 48        (increment by 1)
    qma-profile 1
  ...

  rf-chan 68            (repeat for chan 68 to 95 for video qams)
    type VIDEO
    frequency 519000000         (increment by 6000000)
    rf-output NORMAL
    power-adjust 0
    docsis-channel-id 68        (increment by 1)
    qma-profile 1
  ...


// Bundle interface config
interface Bundle1
  ip address 101.0.0.1 255.255.0.0 secondary
  ip address 101.0.0.1 255.255.0.0
  ip pim sparse-mode
  load-interval 30
  cable arp filter request-send 3 2
  cable arp filter reply-accept 3 2
  cable dhcp-giaddr policy
  cable helper-address 1.9.119.1
  arp timeout 172800


// Fiber node config (Note: each DS maps to 2 fiber nodes)
cable fiber-node 1      (repeated for 1 to 16)
  description Cable0/0/0                (update every node)
  downstream Integrated-Cable 0/0/0     (update every other fiber-node)
  upstream Upstream-Cable 0/0/0         (update every node)


// US controller config
controller Upstream-Cable 0/0/0         (repeat for 0/0/0 to 0/0/15)
                                        (repeat for us-channel 0 to 3)
  us-channel 0 frequency 13200000       (increment by 640000)
  us-channel 0 channel-width 6400000 6400000
  us-channel 0 power-level 6
  us-channel 0 docsis-mode atdma
  us-channel 0 minislot-size 1
  us-channel 0 modulation-profile 221
  no us-channel 0 shutdown
  us-channel 0 secondary


