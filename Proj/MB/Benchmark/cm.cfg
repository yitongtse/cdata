version 12.2
no service pad
service timestamps debug uptime
service timestamps log uptime
no service password-encryption
!
hostname uBR900-msin
!
logging queue-limit 100
!
clock timezone - -8
ip subnet-zero
no ip routing
ip tftp source-interface cable-modem0
!
!
!
!
interface Ethernet0
 no ip route-cache
 bridge-group 59
 bridge-group 59 spanning-disabled
!
interface Ethernet1
 ip address dhcp
 no ip route-cache
!
interface Ethernet2
 ip address dhcp
 no ip route-cache
!
interface Ethernet3
 ip address dhcp
 no ip route-cache
 shutdown
!
interface Ethernet4
 ip address dhcp
 no ip route-cache
 shutdown
!
interface cable-modem0
 no ip route-cache
 no keepalive
 bridge-group 59
 bridge-group 59 spanning-disabled
!
ip default-gateway 145.1.1.1
ip classless
!
cdp run
snmp-server enable traps snmp authentication linkdown linkup coldstart warmstart
snmp-server enable traps tty
snmp-server manager
!
line con 0
line vty 0 4
 login
!
scheduler max-task-time 5000
end

