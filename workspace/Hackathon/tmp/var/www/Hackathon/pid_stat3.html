<html>
  <head>
    <title>Program statistics</title>

    <script src="https://www.google.com/jsapi"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script>
        google.load("visualization", "1", {packages:["corechart"]});
    </script>
  </head>

  <body>
    <h1> HACKalizer: PID Statistics </h1>
    <div id="chart" style="width: 900px; height: 500px;"></div>

    <script>
        var chart;
        var options;

        function draw(data) {
            var stat = JSON.parse(data);
            var stat_chart = new Array();
            stat_chart[0] = ["PIDs", "Percentage"];
            for (i = 0; i < stat.length; i++) {
                stat_chart[i + 1]
                        = ["PID " + stat[i].pid, stat[i].tp_cnt];
            }

            chartData = google.visualization.arrayToDataTable(
                                stat_chart);
            chart.draw(chartData, options);
        }

        function update() {
            $.ajax({url: "pid_stat.txt", success: draw});
        }

        $(document).ready(function() {
            chart = new google.visualization.PieChart(
                                  document.getElementById('chart'));
            options = { title: 'PID Statistics', pieHole: 0.5 };

            update();

            //setInterval(update, 1200);
        });
    </script>

    <h1 id="test"></h1>
    <div id="piechart" style="width: 900px; height: 500px;"></div>

  </body>
</html>
